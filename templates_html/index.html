<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 2rem; }

    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }

    input[type="file"],
    select,
    input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fafafa;
      appearance: none;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #333; }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }

    #status {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.5rem;
      color: #555;
    }

    #download-link {
      display: none;
      margin-top: 1rem;
      text-align: center;
    }
    #download-link a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #0055ff;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .no-templates {
      color: #999;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mock Generator</h1>

    {% if not templates %}
      <p class="no-templates">No templates configured yet.<br>Add one via the CLI to get started.</p>
    {% else %}
    <form id="gen-form">
      <div class="field">
        <label>Video file</label>
        <input type="file" name="video" accept="video/*" required />
      </div>

      <div class="field">
        <label>Template</label>
        <select name="template" required>
          {% for name in templates %}
            <option value="{{ name }}">{{ name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label>FPS</label>
          <input type="number" name="fps" value="15" min="1" max="30" />
        </div>
        <div class="field">
          <label>Duration (sec)</label>
          <input type="number" name="duration" value="5" min="1" max="30" step="0.5" />
        </div>
      </div>

      <button type="submit" id="submit-btn">Generate GIF</button>
    </form>

    <div id="status"></div>
    <div id="download-link"><a href="#" id="dl-anchor">Download GIF</a></div>
    {% endif %}
  </div>

  <script>
    const form = document.getElementById("gen-form");
    const status = document.getElementById("status");
    const dlWrap = document.getElementById("download-link");
    const dlAnchor = document.getElementById("dl-anchor");
    const btn = document.getElementById("submit-btn");

    if (form) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.textContent = "Generating… this may take a moment.";
        dlWrap.style.display = "none";
        btn.disabled = true;

        const data = new FormData(form);
        try {
          const res = await fetch("/generate", { method: "POST", body: data });
          const json = await res.json();
          if (json.error) {
            status.textContent = "Error: " + json.error;
          } else {
            status.textContent = "Done!";
            dlAnchor.href = json.download_url;
            dlWrap.style.display = "block";
          }
        } catch (err) {
          status.textContent = "Something went wrong. Try again.";
        } finally {
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
