<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Maker — Nextdoor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #232f46;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      padding: 20px 32px;
      border-bottom: 1px solid #cad3e5;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .header-wordmark {
      font-size: 15px;
      font-weight: 700;
      color: #1B8751;
      letter-spacing: -0.3px;
    }
    .header-sep {
      width: 1px;
      height: 18px;
      background: #cad3e5;
      margin: 0 10px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: #232f46;
      letter-spacing: -0.5px;
    }

    /* ── Error Banner ── */
    #error-banner {
      display: none;
      background: #fff0f0;
      border: 1px solid #f5b5b5;
      color: #c0222a;
      font-size: 13px;
      padding: 10px 32px;
    }

    /* ── Two-column layout ── */
    .layout {
      display: flex;
      flex: 1;
      align-items: flex-start;
      padding: 32px;
      gap: 24px;
      min-height: 0;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Left column ── */
    .left-col {
      flex: 0 0 700px;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Cards ── */
    .card {
      border: 1.5px solid #cad3e5;
      border-radius: 12px;
      padding: 24px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #576580;
      margin-bottom: 16px;
    }

    /* ── Radio groups ── */
    .radio-row {
      display: flex;
      gap: 32px;
      margin-bottom: 16px;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .radio-group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #576580;
      margin-bottom: 4px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: #232f46;
      padding: 2px 0;
    }
    .radio-option input[type="radio"] {
      display: none;
    }
    .radio-custom {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #cad3e5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.12s;
    }
    .radio-option input[type="radio"]:checked + .radio-custom {
      border-color: #232f46;
    }
    .radio-option input[type="radio"]:checked + .radio-custom::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #232f46;
    }

    /* ── Asset upload zones ── */
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .upload-zone {
      background: #f0f2f5;
      border: 1.5px dashed #cad3e5;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-zone:hover {
      border-color: #576580;
      background: #e8eaed;
    }
    .upload-zone.has-file {
      border-color: #1B8751;
      background: #f0f7f3;
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon {
      font-size: 22px;
      margin-bottom: 6px;
      color: #576580;
    }
    .upload-label {
      font-size: 13px;
      font-weight: 600;
      color: #232f46;
      margin-bottom: 2px;
    }
    .upload-hint {
      font-size: 11px;
      color: #576580;
    }
    .upload-filename {
      font-size: 11px;
      color: #1B8751;
      margin-top: 4px;
      word-break: break-all;
    }

    /* ── Text fields ── */
    .field {
      margin-bottom: 16px;
    }
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: #232f46;
      margin-bottom: 6px;
      display: block;
    }
    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #cad3e5;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      color: #232f46;
      background: #fff;
      transition: border-color 0.12s;
    }
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #232f46;
    }
    textarea {
      resize: vertical;
      min-height: 90px;
    }
    .char-counter {
      font-size: 12px;
      color: #576580;
      text-align: right;
      margin-top: 4px;
    }
    .char-counter.over { color: #c0222a; }

    /* ── Right column ── */
    .right-col {
      flex: 1;
      position: sticky;
      top: 32px;
      height: calc(100vh - 100px);
    }
    .preview-panel {
      background: #f0f2f5;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      height: 100%;
    }
    .preview-area {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #e4e7ed;
    }
    .preview-placeholder {
      text-align: center;
      color: #576580;
      font-size: 14px;
      padding: 24px;
    }
    .preview-placeholder-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    #preview-frame-img {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #preview-media-layer {
      display: none;
      position: absolute;
      overflow: hidden;
    }
    #preview-media-layer img,
    #preview-media-layer video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #preview-logo-layer {
      display: none;
      position: absolute;
      overflow: hidden;
    }
    #preview-logo-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .generate-btn {
      width: 100%;
      padding: 14px 24px;
      background: #232f46;
      color: #fff;
      border: none;
      border-radius: 1000px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .generate-btn:hover { background: #2e3d5a; }
    .generate-btn:disabled { background: #9aa3b2; cursor: not-allowed; }
    #status-msg {
      font-size: 13px;
      color: #576580;
      text-align: center;
      min-height: 18px;
    }
    #download-wrap {
      display: none;
      width: 100%;
      text-align: center;
    }
    #dl-link {
      font-size: 14px;
      font-weight: 600;
      color: #1B8751;
      text-decoration: none;
    }
    #dl-link:hover { text-decoration: underline; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
  <span class="header-logo">
    <svg width="32" height="26" viewBox="0 0 48.616 38.76" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 15.580625514339303 5.509936432432843 L 15.580625514339303 0 L 8.450370368137799 0 L 8.450370368137799 10.00876278806452 L 0 15.342676073396351 L 3.7932958178372007 21.409337717055244 L 8.470742774618207 18.4578785803206 L 8.470742774618207 38.759690780048174 L 40.14537161812661 38.759690780048174 L 40.14537161812661 18.4578785803206 L 44.82281680892231 21.409337717055244 L 48.61611557006836 15.342676073396351 L 24.30805778503418 0 L 15.580625514339303 5.509936432432843 Z" fill="#1B8751"/>
    </svg>
    <span class="header-wordmark">Nextdoor</span>
  </span>
  <span class="header-title">Mock Maker</span>
  </div>
</header>

<!-- Error banner -->
<div id="error-banner"></div>

<!-- Two-column layout -->
<div class="layout">

  <!-- Left column -->
  <div class="left-col">

    <!-- Card 1: Format -->
    <div class="card">
      <div class="card-title">Format</div>

      <!-- Top row: Device, Background, Ad Format -->
      <div class="radio-row">

        <div class="radio-group">
          <div class="radio-group-label">Device</div>
          <label class="radio-option"><input type="radio" name="device" value="web" checked><span class="radio-custom"></span>Web (mobile)</label>
          <label class="radio-option"><input type="radio" name="device" value="ios"><span class="radio-custom"></span>iOS</label>
          <label class="radio-option"><input type="radio" name="device" value="android"><span class="radio-custom"></span>Android</label>
          <label class="radio-option"><input type="radio" name="device" value="desktop"><span class="radio-custom"></span>Desktop</label>
        </div>

        <div class="radio-group">
          <div class="radio-group-label">Ad Format</div>
          <label class="radio-option"><input type="radio" name="ad_format" value="newsfeed" checked><span class="radio-custom"></span>Newsfeed</label>
          <label class="radio-option"><input type="radio" name="ad_format" value="carousel"><span class="radio-custom"></span>Carousel</label>
          <label class="radio-option"><input type="radio" name="ad_format" value="personalized"><span class="radio-custom"></span>Personalized</label>
          <label class="radio-option"><input type="radio" name="ad_format" value="lead_gen"><span class="radio-custom"></span>Lead Gen</label>
        </div>

      </div>

      <!-- Second row: Type and Crop (shown/hidden based on format) -->
      <div id="type-crop-row" class="radio-row" style="margin-bottom:0">

        <div class="radio-group">
          <div class="radio-group-label">Type</div>
          <label class="radio-option"><input type="radio" name="media_type" value="image" checked><span class="radio-custom"></span>Image</label>
          <label class="radio-option"><input type="radio" name="media_type" value="video"><span class="radio-custom"></span>Video <span style="font-size:11px;color:#576580;margin-left:4px">(renders as GIF)</span></label>
        </div>

        <div class="radio-group">
          <div class="radio-group-label">Crop</div>
          <label class="radio-option"><input type="radio" name="crop" value="1_1" checked><span class="radio-custom"></span>Square (1:1)</label>
          <label class="radio-option"><input type="radio" name="crop" value="16_9"><span class="radio-custom"></span>Landscape (16:9)</label>
        </div>

      </div>
    </div>

    <!-- Card 2: Assets -->
    <div class="card">
      <div class="card-title">Assets</div>

      <!-- Upload zones -->
      <div class="upload-row">
        <div class="upload-zone" id="logo-zone">
          <input type="file" id="logo" name="logo" accept="image/*">
          <div class="upload-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="5" width="18" height="14" rx="2" stroke="#576580" stroke-width="1.5"/>
              <circle cx="8.5" cy="10.5" r="1.5" fill="#576580"/>
              <path d="M3 16l4.5-4.5 3 3 3-3.5 4.5 5" stroke="#576580" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="upload-label">Upload logo</div>
          <div class="upload-hint">Max 50MB</div>
          <div class="upload-filename" id="logo-filename"></div>
        </div>
        <div class="upload-zone" id="media-zone">
          <input type="file" id="media" name="media" accept="image/*,video/*" required>
          <div class="upload-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4v10m0-10l-3 3m3-3l3 3" stroke="#576580" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="#576580" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="upload-label">Upload media</div>
          <div class="upload-hint">Max 150MB</div>
          <div class="upload-filename" id="media-filename"></div>
        </div>
      </div>

      <!-- Text fields -->
      <div class="field" id="headline-field">
        <label class="field-label" for="headline">Headline</label>
        <input type="text" id="headline" name="headline" placeholder="Write your headline…">
        <div class="char-counter" id="headline-counter">0/70</div>
      </div>

      <div class="field" id="body-field">
        <label class="field-label" for="body">Description</label>
        <textarea id="body" name="body" placeholder="Write your description…"></textarea>
        <div class="char-counter" id="body-counter">0/1700</div>
      </div>

      <div class="field" id="cta-field" style="margin-bottom:0">
        <label class="field-label" for="cta">CTA text</label>
        <input type="text" id="cta" name="cta" placeholder="e.g. Learn More">
        <div class="char-counter" id="cta-counter">0/45</div>
      </div>
    </div>

    <!-- Hidden video options (kept for /generate compat) -->
    <div id="video-options" class="hidden">
      <input type="hidden" id="fps" name="fps" value="15">
      <input type="hidden" id="duration" name="duration" value="5">
    </div>

  </div><!-- /left-col -->

  <!-- Right column -->
  <div class="right-col">
    <div class="preview-panel">

      <div class="preview-area" id="preview-area">
        <div class="preview-placeholder" id="preview-placeholder">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.35;margin-bottom:10px">
            <rect x="4" y="6" width="32" height="22" rx="3" stroke="#576580" stroke-width="2"/>
            <path d="M14 34h12M20 28v6" stroke="#576580" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <div>Your mock will appear here</div>
        </div>
        <img id="preview-frame-img" alt="Figma frame">
        <div id="preview-media-layer">
          <img id="preview-media-img" alt="Media preview" style="display:none">
          <video id="preview-media-video" autoplay loop muted playsinline style="display:none"></video>
        </div>
        <div id="preview-logo-layer">
          <img id="preview-logo-img" alt="Logo preview">
        </div>
      </div>

      <div id="status-msg"></div>

      <button class="generate-btn" id="submit-btn" type="button">Generate</button>

      <div id="download-wrap">
        <a id="dl-link" href="#">↓ Download mockup</a>
      </div>

    </div>
  </div><!-- /right-col -->

</div><!-- /layout -->

<script>
  const FORMAT_SPECS = {{ format_specs | tojson }};

  // ── State ──
  let currentFrameData = null; // { frame_url, component, media_region, logo_region }
  let mediaObjectURL = null;
  let logoObjectURL = null;

  // ── Derive format_key from selections ──
  function getFormatKey() {
    const adFormat = document.querySelector('input[name="ad_format"]:checked')?.value;
    const mediaType = document.querySelector('input[name="media_type"]:checked')?.value;
    const crop = document.querySelector('input[name="crop"]:checked')?.value;

    if (adFormat === 'carousel') return 'carousel';
    if (adFormat === 'lead_gen') return 'lead_gen';
    if (adFormat === 'personalized') return 'spotlight';
    // newsfeed: derive from type + crop
    if (mediaType === 'video') return `video_${crop}`;
    return `image_${crop}`;
  }

  function getDevice() {
    return document.querySelector('input[name="device"]:checked')?.value || 'web';
  }

  // ── Refresh preview on any format change ──
  function updateFormatUI() {
    triggerPreviewRefresh();
  }

  // ── Char counters ──
  const LIMITS = { headline: 70, body: 1700, cta: 45 };
  function updateCounter(field) {
    const input = document.getElementById(field);
    const counter = document.getElementById(`${field}-counter`);
    const max = LIMITS[field];
    const len = input.value.length;
    counter.textContent = `${len}/${max}`;
    counter.classList.toggle('over', len > max);
  }

  ['headline', 'body', 'cta'].forEach(f => {
    document.getElementById(f).addEventListener('input', () => updateCounter(f));
  });

  // ── Upload zone feedback ──
  function wireUploadZone(inputId, zoneId, filenameId) {
    const input = document.getElementById(inputId);
    const zone = document.getElementById(zoneId);
    const fnEl = document.getElementById(filenameId);
    input.addEventListener('change', () => {
      const file = input.files[0];
      if (file) {
        zone.classList.add('has-file');
        fnEl.textContent = file.name;
      } else {
        zone.classList.remove('has-file');
        fnEl.textContent = '';
      }
      if (inputId === 'media') onMediaChange();
      if (inputId === 'logo') onLogoChange();
    });
  }
  wireUploadZone('logo', 'logo-zone', 'logo-filename');
  wireUploadZone('media', 'media-zone', 'media-filename');

  // ── Live preview: media overlay ──
  function onMediaChange() {
    const file = document.getElementById('media').files[0];
    if (mediaObjectURL) { URL.revokeObjectURL(mediaObjectURL); mediaObjectURL = null; }
    if (!file) {
      document.getElementById('preview-media-layer').style.display = 'none';
      document.getElementById('preview-media-img').style.display = 'none';
      document.getElementById('preview-media-video').style.display = 'none';
      return;
    }
    mediaObjectURL = URL.createObjectURL(file);
    const isVid = file.type.startsWith('video/');
    const imgEl = document.getElementById('preview-media-img');
    const vidEl = document.getElementById('preview-media-video');
    if (isVid) {
      vidEl.src = mediaObjectURL;
      vidEl.style.display = '';
      imgEl.style.display = 'none';
    } else {
      imgEl.src = mediaObjectURL;
      imgEl.style.display = '';
      vidEl.style.display = 'none';
    }
    positionMediaLayer();
    // show video-options hidden inputs based on type
    document.getElementById('video-options').classList.toggle('hidden', !isVid);
  }

  function onLogoChange() {
    const file = document.getElementById('logo').files[0];
    if (logoObjectURL) { URL.revokeObjectURL(logoObjectURL); logoObjectURL = null; }
    if (!file) {
      document.getElementById('preview-logo-layer').style.display = 'none';
      return;
    }
    logoObjectURL = URL.createObjectURL(file);
    document.getElementById('preview-logo-img').src = logoObjectURL;
    positionLogoLayer();
  }

  // ── Position overlay layers based on currentFrameData ──
  function positionMediaLayer() {
    if (!currentFrameData?.media_region) return;
    const area = document.getElementById('preview-area');
    const frameImg = document.getElementById('preview-frame-img');
    if (frameImg.style.display === 'none' || !frameImg.naturalWidth) return;

    const comp = currentFrameData.component;
    const mr = currentFrameData.media_region;
    const areaW = area.clientWidth;
    const areaH = area.clientHeight;

    // Figure out the rendered dimensions of the frame img (object-fit: contain)
    const imgAspect = comp.width / comp.height;
    const areaAspect = areaW / areaH;
    let renderedW, renderedH, offsetX, offsetY;
    if (imgAspect > areaAspect) {
      renderedW = areaW;
      renderedH = areaW / imgAspect;
      offsetX = 0;
      offsetY = (areaH - renderedH) / 2;
    } else {
      renderedH = areaH;
      renderedW = areaH * imgAspect;
      offsetY = 0;
      offsetX = (areaW - renderedW) / 2;
    }
    const scaleX = renderedW / comp.width;
    const scaleY = renderedH / comp.height;

    const layer = document.getElementById('preview-media-layer');
    layer.style.display = '';
    layer.style.left   = `${offsetX + mr.x * scaleX}px`;
    layer.style.top    = `${offsetY + mr.y * scaleY}px`;
    layer.style.width  = `${mr.width * scaleX}px`;
    layer.style.height = `${mr.height * scaleY}px`;
  }

  function positionLogoLayer() {
    if (!currentFrameData?.logo_region) return;
    const area = document.getElementById('preview-area');
    const frameImg = document.getElementById('preview-frame-img');
    if (frameImg.style.display === 'none' || !frameImg.naturalWidth) return;

    const comp = currentFrameData.component;
    const lr = currentFrameData.logo_region;
    const areaW = area.clientWidth;
    const areaH = area.clientHeight;

    const imgAspect = comp.width / comp.height;
    const areaAspect = areaW / areaH;
    let renderedW, renderedH, offsetX, offsetY;
    if (imgAspect > areaAspect) {
      renderedW = areaW;
      renderedH = areaW / imgAspect;
      offsetX = 0;
      offsetY = (areaH - renderedH) / 2;
    } else {
      renderedH = areaH;
      renderedW = areaH * imgAspect;
      offsetY = 0;
      offsetX = (areaW - renderedW) / 2;
    }
    const scaleX = renderedW / comp.width;
    const scaleY = renderedH / comp.height;

    const logoLayer = document.getElementById('preview-logo-layer');
    if (logoObjectURL) {
      logoLayer.style.display = '';
    }
    logoLayer.style.left   = `${offsetX + lr.x * scaleX}px`;
    logoLayer.style.top    = `${offsetY + lr.y * scaleY}px`;
    logoLayer.style.width  = `${lr.width * scaleX}px`;
    logoLayer.style.height = `${lr.height * scaleY}px`;
  }

  // ── Fetch frame from /api/frame ──
  let fetchDebounceTimer = null;
  function triggerPreviewRefresh() {
    clearTimeout(fetchDebounceTimer);
    fetchDebounceTimer = setTimeout(fetchFrame, 200);
  }

  async function fetchFrame() {
    const device = getDevice();
    const format_key = getFormatKey();
    try {
      const res = await fetch(`/api/frame?device=${encodeURIComponent(device)}&format=${encodeURIComponent(format_key)}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data.error) return;
      currentFrameData = data;

      const frameImg = document.getElementById('preview-frame-img');
      const placeholder = document.getElementById('preview-placeholder');
      frameImg.src = data.frame_url;
      frameImg.style.display = '';
      placeholder.style.display = 'none';

      frameImg.onload = () => {
        positionMediaLayer();
        positionLogoLayer();
      };
      // If already cached/loaded
      if (frameImg.complete && frameImg.naturalWidth) {
        positionMediaLayer();
        positionLogoLayer();
      }
    } catch (e) {
      // silently fail — preview just won't update
    }
  }

  // ── Wire up all radio changes ──
  document.querySelectorAll('input[name="device"], input[name="ad_format"], input[name="media_type"], input[name="crop"]').forEach(el => {
    el.addEventListener('change', updateFormatUI);
  });

  // ── Generate button ──
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const btn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');
    const dlWrap = document.getElementById('download-wrap');
    const dlLink = document.getElementById('dl-link');
    const errorBanner = document.getElementById('error-banner');

    const mediaFile = document.getElementById('media').files[0];
    if (!mediaFile) {
      showError('Please upload a media file.');
      return;
    }

    btn.disabled = true;
    statusMsg.textContent = 'Generating… this may take a moment.';
    dlWrap.style.display = 'none';
    errorBanner.style.display = 'none';

    try {
      const formData = new FormData();
      formData.append('device', getDevice());
      formData.append('format', getFormatKey());
      formData.append('headline', document.getElementById('headline').value);
      formData.append('body', document.getElementById('body').value);
      formData.append('cta', document.getElementById('cta').value);
      formData.append('fps', document.getElementById('fps').value || '15');
      formData.append('duration', document.getElementById('duration').value || '5');
      formData.append('media', mediaFile);
      const logoFile = document.getElementById('logo').files[0];
      if (logoFile) formData.append('logo', logoFile);

      const res = await fetch('/generate', { method: 'POST', body: formData });
      const json = await res.json();

      if (json.error) {
        showError(json.error);
        statusMsg.textContent = '';
      } else {
        statusMsg.textContent = 'Done!';
        dlLink.href = json.download_url;
        dlLink.textContent = `Download ${json.download_name}`;
        dlWrap.style.display = 'block';
      }
    } catch (err) {
      showError('Something went wrong. Try again.');
      statusMsg.textContent = '';
    } finally {
      btn.disabled = false;
    }
  });

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    banner.textContent = msg;
    banner.style.display = 'block';
  }

  // ── Init ──
  updateFormatUI();
  fetchFrame();
</script>
</body>
</html>
